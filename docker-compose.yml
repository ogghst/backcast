services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  alembic:
    build:
      context: .
      dockerfile: Dockerfile.alembic
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "${DEBUG}"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrations

  adminer:
    image: adminer:latest
    ports:
      - "7090:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    container_name: backcast_rustfs
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ACCESS_KEY}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_SECRET_KEY}
      RUSTFS_ALLOW_INSECURE_DEFAULT_CREDENTIALS: true
    ports:
      - "${RUSTFS_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: backcast_phoenix
    ports:
      - "${PHOENIX_PORT:-6006}:6006"
    environment:
      PHOENIX_ENABLE_AUTH: "false"
    volumes:
      - phoenix_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6006/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Ollama — local & cloud LLM inference (OpenAI-compatible endpoint).
  # The local backend (run by dev-start.sh) reaches it at http://localhost:${OLLAMA_HOST_PORT:-11435}.
  # Non-standard host port (11435) avoids colliding with a default Ollama on :11434.
  ollama:
    image: ollama/ollama:latest
    container_name: backcast_ollama
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      # Required for CLOUD models (tags ending in -cloud, e.g. gemma4:31b-cloud).
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"
    ports:
      - "${OLLAMA_HOST_PORT:-11435}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=127.0.0.1:11434 ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # One-shot: pre-pull configured models (default: gemma4:31b-cloud) into Ollama.
  ollama-init:
    image: ollama/ollama:latest
    container_name: backcast_ollama_init
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"
      OLLAMA_MODELS: "${OLLAMA_MODELS:-gemma4:31b-cloud}"
    volumes:
      - ./scripts/ollama/pull-models.sh:/pull-models.sh:ro
    entrypoint: ["/bin/sh", "/pull-models.sh"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  rustfs_data:
  rustfs_logs:
  phoenix_data:
  ollama_data:
