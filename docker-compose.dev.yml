# Development Docker Compose for Backcast
# Usage: docker compose -f docker-compose.dev.yml --env-file .env.dev up
#
# Features:
# - Hot-reload for backend (FastAPI --reload)
# - Hot-reload for frontend (Vite dev server)
# - PostgreSQL with persistent volume
# - Adminer database GUI at http://localhost:7090

services:
  postgres:
    image: postgres:15-alpine
    container_name: backcast_dev_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev.backend
    container_name: backcast_dev_backend
    environment:
      # Database (use internal docker network for postgres)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Application
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "true"
      PORT: 8020
      API_V1_STR: /api/v1
      # CORS (allow frontend dev server)
      BACKEND_CORS_ORIGINS: '["http://localhost:5173", "http://localhost:3000"]'
      # RBAC
      RBAC_PROVIDER: database
      # Logging
      LOG_LEVEL: DEBUG
      # RustFS / S3 Storage
      RUSTFS_ENDPOINT_URL: http://rustfs:9000
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_BUCKET_NAME: ${RUSTFS_BUCKET_NAME:-backcast-documents}
    volumes:
      # Mount source code for hot-reload
      - ./backend:/app
      - backend_venv:/app/.venv
    ports:
      - "8020:8020"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network
    command: .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8020 --reload

  # Agent scheduler — separate always-on process that polls the shared DB for
  # due schedules and fires them by calling the backend trigger API. Owns
  # scheduling only (no agent executions run here).
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dev.backend
    container_name: backcast_dev_scheduler
    environment:
      # Database (mirror backend; uses internal docker network)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Application (Settings() raises if any required field is missing)
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      PORT: 8020
      API_V1_STR: /api/v1
      PROJECT_NAME: ${PROJECT_NAME:-Backcast}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      BACKEND_CORS_ORIGINS: '["http://localhost:5173", "http://localhost:3000"]'
      BACKEND_CORS_METHODS: ${BACKEND_CORS_METHODS:-["*"]}
      BACKEND_CORS_HEADERS: ${BACKEND_CORS_HEADERS:-["*"]}
      # RBAC
      RBAC_PROVIDER: database
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${LOG_FILE:-logs/app.log}
      # RustFS / S3 (mirror backend; harmless for the scheduler)
      RUSTFS_ENDPOINT_URL: http://rustfs:9000
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_BUCKET_NAME: ${RUSTFS_BUCKET_NAME:-backcast-documents}
      # Scheduler-specific
      SCHEDULER_API_BASE_URL: http://backend:8020
      SCHEDULER_POLL_INTERVAL_SECONDS: ${SCHEDULER_POLL_INTERVAL_SECONDS:-60}
      SCHEDULER_MAX_CONCURRENCY: ${SCHEDULER_MAX_CONCURRENCY:-5}
      SCHEDULER_MISFIRE_GRACE_SECONDS: ${SCHEDULER_MISFIRE_GRACE_SECONDS:-120}
      SCHEDULER_DB_POOL_SIZE: ${SCHEDULER_DB_POOL_SIZE:-5}
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - dev_network
    command: .venv/bin/python -m app.scheduler

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev.frontend
    container_name: backcast_dev_frontend
    environment:
      # Vite needs these for the dev server proxy
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8020}
      VITE_WEBSOCKET_URL: ${VITE_WEBSOCKET_URL:-ws://localhost:8020}
    volumes:
      # Mount source code for hot-reload (node_modules handled in .dockerignore)
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    networks:
      - dev_network
    command: npm run dev -- --host 0.0.0.0

  alembic:
    build:
      context: .
      dockerfile: Dockerfile.dev.backend
    container_name: backcast_dev_alembic
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network
    profiles:
      - migrations
    command: .venv/bin/alembic upgrade head

  adminer:
    image: adminer:latest
    container_name: backcast_dev_adminer
    ports:
      - "7090:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev_network

  rustfs:
    image: rustfs/rustfs:latest
    container_name: backcast_dev_rustfs
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_SECRET_KEY:-rustfsadmin}
    ports:
      - "${RUSTFS_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs_dev_data:/data
      - rustfs_dev_logs:/logs
    networks:
      - dev_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama — local & cloud LLM inference (OpenAI-compatible endpoint).
  # Internal (containerized backend): http://ollama:11434
  # Host (local backend via dev-start.sh): http://localhost:${OLLAMA_HOST_PORT:-11435}
  # Non-standard host port (11435) avoids colliding with a default Ollama on :11434.
  ollama:
    image: ollama/ollama:latest
    container_name: backcast_dev_ollama
    environment:
      # Bind all interfaces on the standard internal port.
      OLLAMA_HOST: "0.0.0.0:11434"
      # Optional — only for DIRECT access to https://ollama.com. The local server
      # proxies *-cloud models via an `ollama signin` session, NOT this key.
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"
    ports:
      - "${OLLAMA_HOST_PORT:-11435}:11434"
    volumes:
      - ollama_dev_data:/root/.ollama
    networks:
      - dev_network
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=127.0.0.1:11434 ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # One-shot: pre-pull configured models (default: gemma4:31b-cloud) into the running
  # Ollama server. Idempotent — re-runs safely on every `up`.
  ollama-init:
    image: ollama/ollama:latest
    container_name: backcast_dev_ollama_init
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"
      OLLAMA_MODELS: "${OLLAMA_MODELS:-gemma4:31b-cloud}"
    volumes:
      - ./scripts/ollama/pull-models.sh:/pull-models.sh:ro
    entrypoint: ["/bin/sh", "/pull-models.sh"]
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - dev_network
    restart: "no"

networks:
  dev_network:
    driver: bridge

volumes:
  postgres_dev_data:
  backend_venv:
  frontend_node_modules:
  rustfs_dev_data:
  rustfs_dev_logs:
  ollama_dev_data:
