version: "3.8"

services:
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: backcast-phoenix
    ports:
      - "6006:6006"  # Phoenix UI and OTLP HTTP collector
      - "4317:4317"  # OTLP gRPC collector
    networks:
      - backcast-network

networks:
  backcast-network:
    driver: bridge
