# Pre-commit hooks configuration for Backcast  backend
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

default_language_version:
  python: python3.12

repos:
  - repo: local
    hooks:
      # Ruff linter with auto-fix for Python files
      - id: ruff
        name: Ruff Linter (with auto-fix)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true

      # Ruff formatter for Python files
      - id: ruff-format
        name: Ruff Formatter
        entry: uv run ruff format
        language: system
        types: [python]

      # MyPy type checker in strict mode
      - id: mypy
        name: MyPy (strict mode)
        entry: uv run mypy app --strict
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
