# Production Docker Compose for Backcast 
# This file is isolated from development configuration
# Usage: docker compose -f deploy/docker-compose.yml --env-file deploy/.env.production up -d

services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${TRAEFIK_HTTP_PORT:-8080}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-logs:/var/log/traefik
      - traefik-letsencrypt:/letsencrypt
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # Dashboard
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=traefik-auth@file"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Alembic Migrations
  alembic:
    build:
      context: ..
      dockerfile: Dockerfile.alembic
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      API_V1_STR: ${API_V1_STR}
      PROJECT_NAME: ${PROJECT_NAME}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      PORT: ${PORT}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      BACKEND_CORS_METHODS: ${BACKEND_CORS_METHODS}
      BACKEND_CORS_HEADERS: ${BACKEND_CORS_HEADERS}
      RBAC_PROVIDER: ${RBAC_PROVIDER:-database}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FILE: ${LOG_FILE}
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - migrations

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: deploy/backend/Dockerfile
      args:
        - PYTHON_VERSION=3.12
    image: backcast_evs_backend:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      PORT: 8080
      LOG_LEVEL: INFO
      RUN_MIGRATIONS: "${RUN_MIGRATIONS:-true}"
      OTEL_ENABLED: "false"
      OTLP_ENDPOINT: http://localhost:6006/v1/traces
      RUSTFS_ENDPOINT_URL: http://rustfs:9000
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_BUCKET_NAME: ${RUSTFS_BUCKET_NAME:-backcast-documents}
      # Browser-facing base for presigned download URLs (Traefik storage subdomain).
      # Server-side S3 ops still use the internal http://rustfs:9000 via RUSTFS_ENDPOINT_URL.
      RUSTFS_PUBLIC_URL: https://storage.${DOMAIN}
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend-logs:/app/logs
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.backend.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
      - "traefik.http.routers.backend.middlewares=security-headers@file,rate-limit@file"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (React SPA)
  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend/Dockerfile
      args:
        - VITE_API_URL=https://api.${DOMAIN}
        - VITE_WEBSOCKET_URL=wss://api.${DOMAIN}
    image: backcast_evs_frontend:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.frontend.rule=Host(`app.${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"
      - "traefik.http.routers.frontend.middlewares=security-headers@file"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Marketing/showcase website (pure static, served at www.${DOMAIN})
  website:
    build:
      context: ..
      dockerfile: deploy/website/Dockerfile
    image: backcast_website:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.website.rule=Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.website.entrypoints=web"
      - "traefik.http.services.website.loadbalancer.server.port=8080"
      - "traefik.http.routers.website.middlewares=security-headers@file"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Adminer (Database GUI)
  adminer:
    image: adminer:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.adminer.rule=Host(`db.${DOMAIN}`)"
      - "traefik.http.routers.adminer.entrypoints=web"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"
      - "traefik.http.routers.adminer.middlewares=adminer-whitelist@file"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # RustFS S3-compatible Storage
  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_SECRET_KEY:-rustfsadmin}
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.rustfs.rule=Host(`storage.${DOMAIN}`)"
      - "traefik.http.routers.rustfs.entrypoints=web"
      - "traefik.http.services.rustfs.loadbalancer.server.port=9000"
      - "traefik.http.routers.rustfs.middlewares=storage-headers@file"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ollama — local & cloud LLM inference (OpenAI-compatible endpoint).
  # The backend's `ollama` AI provider connects to it at http://ollama:11434
  # (configured in the AI Config UI, NOT via env). Host access for ops/pulling:
  # http://localhost:${OLLAMA_HOST_PORT:-11435}. Non-standard host port (11435)
  # avoids colliding with a default Ollama on :11434.
  # Cloud models (e.g. gemma4:31b-cloud) need `ollama signin` (account session, no GPU);
  # local models (e.g. gemma4:31b) need a GPU — uncomment the reservations.devices block below.
  ollama:
    image: ollama/ollama:latest
    container_name: backcast_ollama
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"
    ports:
      - "${OLLAMA_HOST_PORT:-11435}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '1'  # host has 1 CPU; was '4' (invalid on <4-CPU hosts)
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
          # --- Enable NVIDIA GPU for local models (e.g. gemma4:31b). Requires the
          # --- NVIDIA Container Toolkit on the host; remove if running CPU/cloud-only. ---
          # devices:
          #   - driver: nvidia
          #     count: all
          #     capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=127.0.0.1:11434 ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # One-shot: pre-pull configured models (default: gemma4:31b-cloud) into Ollama.
  ollama-init:
    image: ollama/ollama:latest
    container_name: backcast_ollama_init
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"
      OLLAMA_MODELS: "${OLLAMA_MODELS:-gemma4:31b-cloud}"
    volumes:
      - ../scripts/ollama/pull-models.sh:/pull-models.sh:ro
    entrypoint: ["/bin/sh", "/pull-models.sh"]
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge
    internal: false

volumes:
  postgres_data:
  traefik-letsencrypt:
  traefik-logs:
  backend-logs:
  rustfs_data:
  rustfs_logs:
  ollama_data:
