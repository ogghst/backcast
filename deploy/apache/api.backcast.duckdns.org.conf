<VirtualHost *:80>
    ServerName api.backcast.duckdns.org
    Redirect permanent / https://api.backcast.duckdns.org/
</VirtualHost>

<VirtualHost *:443>
    ServerName api.backcast.duckdns.org

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/backcast.duckdns.org.crt
    SSLCertificateKeyFile /etc/ssl/private/backcast.duckdns.org.key

    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    # CORS headers - conditionally set origin based on request
    <If "%{HTTP:Origin} == 'https://app.backcast.duckdns.org' || %{HTTP:Origin} == 'https://api.backcast.duckdns.org' || %{HTTP:Origin} == 'http://app.backcast.duckdns.org:8080' || %{HTTP:Origin} == 'http://api.backcast.duckdns.org:8080'">
        Header always set Access-Control-Allow-Origin "%{HTTP:Origin}e"
        Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS"
        Header always set Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin"
        Header always set Access-Control-Allow-Credentials "true"
        Header always set Access-Control-Max-Age "600"
        Header merge Vary "Origin"
    </If>

    # Proxy to Traefik
    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass / ws://192.168.1.23:8080/
    ProxyPassReverse / ws://192.168.1.23:8080/

    ProxyPass / http://192.168.1.23:8080/
    ProxyPassReverse / http://192.168.1.23:8080/

    ErrorLog ${APACHE_LOG_DIR}/api.backcast.duckdns.org_error.log
    CustomLog ${APACHE_LOG_DIR}/api.backcast.duckdns.org_access.log combined
</VirtualHost>
