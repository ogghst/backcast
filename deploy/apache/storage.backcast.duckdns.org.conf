# RustFS (S3-compatible object storage) VirtualHost.
# Terminates SSL in front of Traefik and proxies to the rustfs router
# (Host(`storage.backcast.duckdns.org`) → rustfs:9000). Presigned download URLs
# generated by the backend point here; ProxyPreserveHost MUST stay On so the
# original Host header reaches RustFS — the SigV4 signature is bound to it.

<VirtualHost *:80>
    ServerName storage.backcast.duckdns.org
    Redirect permanent / https://storage.backcast.duckdns.org/
</VirtualHost>

<VirtualHost *:443>
    ServerName storage.backcast.duckdns.org

    # SSL Configuration (shared wildcard/SAN cert — must cover the storage subdomain)
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/backcast.duckdns.org.crt
    SSLCertificateKeyFile /etc/ssl/private/backcast.duckdns.org.key

    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    # Proxy to Traefik (192.168.1.23:8080). Preserving the Host header is REQUIRED:
    # the browser requests https://storage... and RustFS verifies the presigned URL's
    # SigV4 signature against this exact Host.
    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass / http://192.168.1.23:8080/
    ProxyPassReverse / http://192.168.1.23:8080/

    # Large/many file downloads — allow generous response time.
    ProxyTimeout 600

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/storage.backcast.duckdns.org_error.log
    CustomLog ${APACHE_LOG_DIR}/storage.backcast.duckdns.org_access.log combined
</VirtualHost>
