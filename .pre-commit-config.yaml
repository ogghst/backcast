# Pre-commit hooks configuration for Backcast EVS backend
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

default_language_version:
  python: python3.12

repos:
  - repo: local
    hooks:
      # Ruff linter with auto-fix for Python files
      - id: ruff
        name: Ruff Linter (with auto-fix)
        entry: /bin/bash -c 'export LC_ALL=C.UTF-8; export PATH="$PATH:$HOME/.local/bin"; uv run --directory backend ruff check --fix'
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      # Ruff formatter for Python files
      - id: ruff-format
        name: Ruff Formatter
        entry: /bin/bash -c 'export LC_ALL=C.UTF-8; export PATH="$PATH:$HOME/.local/bin"; uv run --directory backend ruff format'
        language: system
        types: [python]
        pass_filenames: false

      # MyPy type checker in strict mode
      - id: mypy
        name: MyPy (strict mode)
        entry: /bin/bash -c 'export LC_ALL=C.UTF-8; export PATH="$PATH:$HOME/.local/bin"; uv run --directory backend mypy app --strict'
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
