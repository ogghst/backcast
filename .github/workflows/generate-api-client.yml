name: Generate OpenAPI Client

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/app/**/*.py'
      - 'backend/pyproject.toml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/app/**/*.py'
      - 'backend/pyproject.toml'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write

jobs:
  generate-api-client:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            backend/.venv
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/pyproject.toml', 'backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Generate OpenAPI specification
        working-directory: backend
        run: uv run python scripts/generate_openapi.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Generate OpenAPI client
        working-directory: frontend
        run: npm run generate-client

      - name: Check for changes
        id: verify-changes
        run: |
          if [[ -n $(git status --porcelain | grep -E 'frontend/src/api/generated|backend/openapi.json') ]]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "Changes detected in generated files"
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Commit and push changes
        if: steps.verify-changes.outputs.changes_detected == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add backend/openapi.json frontend/src/api/generated/
          git commit -m "chore: auto-generate OpenAPI client from backend spec

- Updated OpenAPI specification from backend
- Regenerated frontend API client types

This commit was automatically generated by the Generate OpenAPI Client workflow."
          git push

      - name: Summary
        run: |
          if [[ "${{ steps.verify-changes.outputs.changes_detected }}" == "true" ]]; then
            echo "✅ OpenAPI client generated and committed successfully"
          else
            echo "ℹ️ No changes to OpenAPI specification - client is up to date"
          fi
